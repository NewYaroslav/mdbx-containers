name: CI

on:
  push:
    branches: [ main, stable ]
  pull_request:
    branches: [ main, stable ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  parent-targets:
    name: Parent MDBX target smoke (${{ matrix.target_case }})
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        target_case:
          - mdbx
          - mdbx-bare
          - libmdbx
          - libmdbx-bare
          - mdbx-static
          - mdbx-static-bare
          - libmdbx-static
          - libmdbx-static-bare

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Configure parent-target smoke
        run: |
          set -euo pipefail
          cmake -S tests/cmake/parent_targets -B "build-parent-${{ matrix.target_case }}" -G "Ninja" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=17 \
            -DMDBXC_PARENT_TARGET_CASE="${{ matrix.target_case }}" \
            -Wno-dev

      - name: Build parent-target smoke
        run: |
          set -euo pipefail
          cmake --build "build-parent-${{ matrix.target_case }}" --parallel

  benchmark-smoke:
    name: Benchmark smoke (Linux C++17)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Ensure libmdbx tags
        run: |
          set -euo pipefail
          git submodule update --init --recursive
          git -C external/libmdbx rev-parse --is-inside-work-tree >/dev/null
          git -C external/libmdbx config remote.origin.fetch "+refs/heads/*:refs/remotes/origin/*"
          git -C external/libmdbx fetch --prune --tags --force
          if git -C external/libmdbx rev-parse --is-shallow-repository | grep -qi true; then
            git -C external/libmdbx fetch --unshallow || git -C external/libmdbx fetch --deepen=1000
          fi
          git -C external/libmdbx describe --tags --abbrev=0 >/dev/null

      - name: Configure benchmark
        run: |
          set -euo pipefail
          cmake -S . -B build-bench -G "Ninja" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=17 \
            -DMDBXC_DEPS_MODE=BUNDLED \
            -DMDBXC_BUILD_TESTS=OFF \
            -DMDBXC_BUILD_EXAMPLES=OFF \
            -DMDBXC_BUILD_BENCHMARKS=ON \
            -Wno-dev

      - name: Build benchmark
        run: |
          set -euo pipefail
          cmake --build build-bench --target sync_tick_hub_benchmark --parallel

      - name: Run benchmark smoke
        run: |
          set -euo pipefail
          output="$(build-bench/bin/benchmarks/sync_tick_hub_benchmark 3 8 3 4 2 4096)"
          printf '%s\n' "$output"
          header="$(printf '%s\n' "$output" | sed -n '1p')"
          case "$header" in
            scenario,phase,*) ;;
            *)
              echo "unexpected benchmark CSV header: $header" >&2
              exit 1
              ;;
          esac
          rows="$(printf '%s\n' "$output" | wc -l | tr -d ' ')"
          test "$rows" = "4"

  http-node-fleet-smoke:
    name: HTTP node fleet smoke (Linux C++17)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Ensure libmdbx tags
        run: |
          set -euo pipefail
          git submodule update --init --recursive
          git -C external/libmdbx rev-parse --is-inside-work-tree >/dev/null
          git -C external/libmdbx config remote.origin.fetch "+refs/heads/*:refs/remotes/origin/*"
          git -C external/libmdbx fetch --prune --tags --force
          if git -C external/libmdbx rev-parse --is-shallow-repository | grep -qi true; then
            git -C external/libmdbx fetch --unshallow || git -C external/libmdbx fetch --deepen=1000
          fi
          git -C external/libmdbx describe --tags --abbrev=0 >/dev/null

      - name: Configure HTTP node fleet
        run: |
          set -euo pipefail
          mkdir -p build-http-fleet
          cmake -S . -B build-http-fleet -G "Ninja" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=17 \
            -DMDBXC_DEPS_MODE=BUNDLED \
            -DMDBXC_BUILD_TESTS=OFF \
            -DMDBXC_BUILD_EXAMPLES=ON \
            -DMDBXC_HTTP_SYNC_EXAMPLE=ON \
            -Wno-dev \
          2>&1 | tee build-http-fleet/configure.log

      - name: Build Simple-Web HTTP sync examples
        run: |
          set -euo pipefail
          cmake --build build-http-fleet \
            --target sync_13_http_simple_web_server \
                     sync_18_http_node_fleet --parallel \
          2>&1 | tee build-http-fleet/build.log

      - name: Run Simple-Web HTTP sync smoke
        run: |
          set -euo pipefail
          build-http-fleet/bin/examples/sync_13_http_simple_web_server \
            demo 127.0.0.1 18080 \
          2>&1 | tee build-http-fleet/http-demo.log
          grep -q "OK: sync_13_http_simple_web_server" \
            build-http-fleet/http-demo.log
          build-http-fleet/bin/examples/sync_13_http_simple_web_server \
            worker-demo 127.0.0.1 18081 \
          2>&1 | tee build-http-fleet/http-worker-demo.log
          grep -q "OK: sync_13_http_simple_web_server (worker-demo)" \
            build-http-fleet/http-worker-demo.log
          build-http-fleet/bin/examples/sync_18_http_node_fleet \
            master-replica 2 \
          2>&1 | tee build-http-fleet/master-replica.log
          grep -q "OK: sync_18_http_node_fleet (master-replica)" \
            build-http-fleet/master-replica.log
          build-http-fleet/bin/examples/sync_18_http_node_fleet \
            mesh 2 \
          2>&1 | tee build-http-fleet/mesh.log
          grep -q "OK: sync_18_http_node_fleet (mesh)" \
            build-http-fleet/mesh.log

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: http-node-fleet-smoke-logs
          path: build-http-fleet/*.log
          if-no-files-found: ignore

  windows:
    name: Windows MinGW64 (C++${{ matrix.std }})
    runs-on: windows-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        std: [11, 17]

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          path-type: inherit
          install: >-
            base-devel
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkg-config

      - name: Ensure libmdbx tags
        env:
          PATH: "/c/Program Files/Git/bin:$PATH"
        run: |
          set -euo pipefail
          git submodule update --init --recursive
          git -C external/libmdbx rev-parse --is-inside-work-tree >/dev/null
          git -C external/libmdbx config remote.origin.fetch "+refs/heads/*:refs/remotes/origin/*"
          git -C external/libmdbx fetch --prune --tags --force
          if git -C external/libmdbx rev-parse --is-shallow-repository | grep -qi true; then
            git -C external/libmdbx fetch --unshallow || git -C external/libmdbx fetch --deepen=1000
          fi
          git -C external/libmdbx describe --tags --abbrev=0 >/dev/null

      - name: Configure
        env:
          CC: x86_64-w64-mingw32-gcc
          CXX: x86_64-w64-mingw32-g++
          PATH: "/c/Program Files/Git/bin:$PATH"
        run: |
          set -euo pipefail
          mkdir -p build
          cmake -S . -B build -G "Ninja" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=${{ matrix.std }} \
            -DCMAKE_POLICY_DEFAULT_CMP0152=NEW \
            -DMDBXC_DEPS_MODE=BUNDLED \
            -DMDBXC_BUILD_TESTS=ON \
            -DMDBXC_BUILD_EXAMPLES=ON \
            -Wno-dev \
          2>&1 | tee build/configure.log

      - name: Build
        run: |
          set -euo pipefail
          cmake --build build --config Release --parallel \
          2>&1 | tee build/build.log

      - name: Run tests
        run: |
          set -euo pipefail
          export PATH="$PWD/build/bin:$PATH"
          ctest --test-dir build --output-on-failure -C Release \
          2>&1 | tee build/ctest.log

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-cxx${{ matrix.std }}-logs
          path: build/*.log
          if-no-files-found: ignore

  websocket-mingw-openssl-fallback:
    name: WebSocket MinGW OpenSSL Crypto fallback
    runs-on: windows-latest
    timeout-minutes: 30

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          path-type: inherit
          install: >-
            base-devel
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkg-config

      - name: Ensure libmdbx tags
        env:
          PATH: "/c/Program Files/Git/bin:$PATH"
        run: |
          set -euo pipefail
          git submodule update --init --recursive
          git -C external/libmdbx rev-parse --is-inside-work-tree >/dev/null
          git -C external/libmdbx config remote.origin.fetch "+refs/heads/*:refs/remotes/origin/*"
          git -C external/libmdbx fetch --prune --tags --force
          if git -C external/libmdbx rev-parse --is-shallow-repository | grep -qi true; then
            git -C external/libmdbx fetch --unshallow || git -C external/libmdbx fetch --deepen=1000
          fi
          git -C external/libmdbx describe --tags --abbrev=0 >/dev/null

      - name: Configure WebSocket fallback example
        env:
          CC: x86_64-w64-mingw32-gcc
          CXX: x86_64-w64-mingw32-g++
          PATH: "/c/Program Files/Git/bin:$PATH"
        run: |
          set -euo pipefail
          mkdir -p build-ws-fallback
          cmake -S . -B build-ws-fallback -G "Ninja" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=17 \
            -DCMAKE_POLICY_DEFAULT_CMP0152=NEW \
            -DCMAKE_DISABLE_FIND_PACKAGE_OpenSSL=TRUE \
            -DMDBXC_DEPS_MODE=BUNDLED \
            -DMDBXC_BUILD_TESTS=OFF \
            -DMDBXC_BUILD_EXAMPLES=ON \
            -DMDBXC_WEBSOCKET_SYNC_EXAMPLE=ON \
            -DMDBXC_WEBSOCKET_SYNC_MINGW_OPENSSL_FALLBACK=ON \
            -Wno-dev \
          2>&1 | tee build-ws-fallback/configure.log
          grep -q "OpenSSL Crypto: using MinGW fallback" \
            build-ws-fallback/configure.log

      - name: Build WebSocket fallback example
        run: |
          set -euo pipefail
          cmake --build build-ws-fallback \
            --target sync_17_websocket_simple_web_server --parallel \
          2>&1 | tee build-ws-fallback/build.log

      - name: Run WebSocket fallback example
        run: |
          set -euo pipefail
          exe_dir="build-ws-fallback/bin/examples"
          test -x "$exe_dir/sync_17_websocket_simple_web_server.exe"
          test -f "$exe_dir/libcrypto-3-x64.dll"
          test ! -f "$exe_dir/libssl-3-x64.dll"
          "$exe_dir/sync_17_websocket_simple_web_server.exe" 127.0.0.1 18194 \
          2>&1 | tee build-ws-fallback/example.log
          grep -q "OK: sync_17_websocket_simple_web_server" \
            build-ws-fallback/example.log

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: websocket-mingw-openssl-fallback-logs
          path: build-ws-fallback/*.log
          if-no-files-found: ignore

