name: CI

on:
  push:
    branches: [ main, stable ]
  pull_request:
    branches: [ main, stable ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  parent-targets:
    name: Parent MDBX target smoke (${{ matrix.target_case }})
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        target_case:
          - mdbx
          - libmdbx
          - mdbx-static
          - libmdbx-static

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Configure parent-target smoke
        run: |
          set -euo pipefail
          cmake -S tests/cmake/parent_targets -B "build-parent-${{ matrix.target_case }}" -G "Ninja" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=17 \
            -DMDBXC_PARENT_TARGET_CASE="${{ matrix.target_case }}" \
            -Wno-dev

      - name: Build parent-target smoke
        run: |
          set -euo pipefail
          cmake --build "build-parent-${{ matrix.target_case }}" --parallel

  windows:
    name: Windows MinGW64 (C++${{ matrix.std }})
    runs-on: windows-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        std: [11, 17]

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          path-type: inherit
          install: >-
            base-devel
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkg-config

      - name: Ensure libmdbx tags
        env:
          PATH: "/c/Program Files/Git/bin:$PATH"
        run: |
          set -euo pipefail
          git submodule update --init --recursive
          git -C external/libmdbx rev-parse --is-inside-work-tree >/dev/null
          git -C external/libmdbx config remote.origin.fetch "+refs/heads/*:refs/remotes/origin/*"
          git -C external/libmdbx fetch --prune --tags --force
          if git -C external/libmdbx rev-parse --is-shallow-repository | grep -qi true; then
            git -C external/libmdbx fetch --unshallow || git -C external/libmdbx fetch --deepen=1000
          fi
          git -C external/libmdbx describe --tags --abbrev=0 >/dev/null

      - name: Configure
        env:
          CC: x86_64-w64-mingw32-gcc
          CXX: x86_64-w64-mingw32-g++
          PATH: "/c/Program Files/Git/bin:$PATH"
        run: |
          set -euo pipefail
          mkdir -p build
          cmake -S . -B build -G "Ninja" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=${{ matrix.std }} \
            -DCMAKE_POLICY_DEFAULT_CMP0152=NEW \
            -DMDBXC_DEPS_MODE=BUNDLED \
            -DMDBXC_BUILD_TESTS=ON \
            -DMDBXC_BUILD_EXAMPLES=ON \
            -Wno-dev \
          2>&1 | tee build/configure.log

      - name: Build
        run: |
          set -euo pipefail
          cmake --build build --config Release --parallel \
          2>&1 | tee build/build.log

      - name: Run tests
        run: |
          set -euo pipefail
          export PATH="$PWD/build/bin:$PATH"
          ctest --test-dir build --output-on-failure -C Release \
          2>&1 | tee build/ctest.log

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-cxx${{ matrix.std }}-logs
          path: build/*.log
          if-no-files-found: ignore

  linux:
    name: Linux (C++${{ matrix.std }})
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        std: [11, 17]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Ensure libmdbx tags
        run: |
          set -euo pipefail
          git submodule update --init --recursive
          git -C external/libmdbx rev-parse --is-inside-work-tree >/dev/null
          git -C external/libmdbx config remote.origin.fetch "+refs/heads/*:refs/remotes/origin/*"
          git -C external/libmdbx fetch --prune --tags --force
          if git -C external/libmdbx rev-parse --is-shallow-repository | grep -qi true; then
            git -C external/libmdbx fetch --unshallow || git -C external/libmdbx fetch --deepen=1000
          fi
          git -C external/libmdbx describe --tags --abbrev=0 >/dev/null

      - name: Configure
        run: |
          set -euo pipefail
          mkdir -p build
          cmake -S . -B build -G "Ninja" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=${{ matrix.std }} \
            -DMDBXC_DEPS_MODE=BUNDLED \
            -DMDBXC_BUILD_TESTS=ON \
            -DMDBXC_BUILD_EXAMPLES=ON \
            -Wno-dev \
          2>&1 | tee build/configure.log

      - name: Build
        run: |
          set -euo pipefail
          cmake --build build --config Release --parallel \
          2>&1 | tee build/build.log

      - name: Run tests
        run: |
          set -euo pipefail
          ctest --test-dir build --output-on-failure -C Release \
          2>&1 | tee build/ctest.log

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: linux-cxx${{ matrix.std }}-logs
          path: build/*.log
          if-no-files-found: ignore

  macos:
    name: macOS (C++${{ matrix.std }})
    runs-on: macos-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        std: [11, 17]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install build tools
        run: |
          brew list cmake >/dev/null 2>&1 || brew install cmake
          brew list ninja >/dev/null 2>&1 || brew install ninja

      - name: Ensure libmdbx tags
        run: |
          set -euo pipefail
          git submodule update --init --recursive
          git -C external/libmdbx rev-parse --is-inside-work-tree >/dev/null
          git -C external/libmdbx config remote.origin.fetch "+refs/heads/*:refs/remotes/origin/*"
          git -C external/libmdbx fetch --prune --tags --force
          if git -C external/libmdbx rev-parse --is-shallow-repository | grep -qi true; then
            git -C external/libmdbx fetch --unshallow || git -C external/libmdbx fetch --deepen=1000
          fi
          git -C external/libmdbx describe --tags --abbrev=0 >/dev/null

      - name: Configure
        run: |
          set -euo pipefail
          mkdir -p build
          cmake -S . -B build -G "Ninja" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=${{ matrix.std }} \
            -DMDBXC_DEPS_MODE=BUNDLED \
            -DMDBXC_BUILD_TESTS=ON \
            -DMDBXC_BUILD_EXAMPLES=ON \
            -Wno-dev \
          2>&1 | tee build/configure.log

      - name: Build
        run: |
          set -euo pipefail
          cmake --build build --config Release --parallel \
          2>&1 | tee build/build.log

      - name: Run tests
        run: |
          set -euo pipefail
          ctest --test-dir build --output-on-failure -C Release \
          2>&1 | tee build/ctest.log

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: macos-cxx${{ matrix.std }}-logs
          path: build/*.log
          if-no-files-found: ignore
